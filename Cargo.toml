[package]
name = "hjs-path-finding"
version = "0.1.0"
edition = "2024"

[features]
parallel = ["dep:rayon"]

[dependencies]
rayon = { version = "1", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
pprof = { version = "0.15.0", features = ["flamegraph", "criterion"] }

[profile.bench]
lto = "fat"
codegen-units = 1

[[bench]]
name = "sssp"
harness = false
